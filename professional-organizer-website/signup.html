<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Clarity & Calm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <style>
        .signup-bg {
            background: linear-gradient(135deg, var(--bg), var(--primary));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 0;
        }
    </style>
</head>
    <div class="container-fluid bg-light-alt min-vh-100 d-flex align-items-center justify-content-center p-4" data-theme="light">
        <div class="row w-100 justify-content-center">
            <div class="col-lg-5 col-md-8 fade-up">
                <div class="glass-card shadow-lg p-5 bg-white border-0">
                    <div class="text-center mb-5">
                        <a href="index.html" class="text-decoration-none">
                            <h2 class="brand-logo mb-3"><img src="assets/images/logo.png" alt="Logo">Clarity<span class="text-accent">&</span>Calm</h2>
                        </a>
                        <p class="text-secondary small mt-2">Start your personalized recovery path today.</p>
                    </div>

                    <div class="mb-4 text-center">
                        <h2 class="fw-bold h2">Create Account</h2>
                    </div>

                    <form>
                        <div class="row g-3">
                            <div class="col-md-6 text-dark">
                                <label class="form-label small fw-bold">First Name</label>
                                <input type="text" class="form-control" placeholder="John" required style="padding: 10px 15px;">
                            </div>
                            <div class="col-md-6 text-dark">
                                <label class="form-label small fw-bold">Last Name</label>
                                <input type="text" class="form-control" placeholder="Doe" required style="padding: 10px 15px;">
                            </div>
                            <div class="col-md-12 text-dark">
                                <label class="form-label small fw-bold">Email Address</label>
                                <input type="email" class="form-control" placeholder="name@example.com" required style="padding: 10px 15px;">
                            </div>
                            <div class="col-md-12 text-dark">
                                <label class="form-label small fw-bold text-dark">Current Home Context (How can we help?)</label>
                                <textarea class="form-control" rows="2" placeholder="Briefly describe the area you'd like to address..." style="padding: 10px 15px;"></textarea>
                            </div>
                            <div class="col-md-12 text-dark">
                                <label class="form-label small fw-bold">Password</label>
                                <input type="password" class="form-control" placeholder="Create a secure password" required style="padding: 10px 15px;">
                            </div>
                            <div class="col-md-12 py-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="terms" required>
                                    <label class="form-check-label text-secondary small" for="terms">
                                        I agree to the <a href="#" class="text-primary fw-bold text-decoration-none">Privacy Policy</a> and <a href="#" class="text-primary fw-bold text-decoration-none">Confidentiality Terms</a>.
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <button type="submit" class="btn btn-primary w-100 py-3 btn-shine mb-4">Create My Account</button>
                            </div>
                        </div>
                        
                        <div class="text-center">
                            <p class="text-secondary small">Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Sign In Instead</a></p>
                        </div>
                    </form>
                </div>
                
                <div class="text-center mt-4">
                    <a href="index.html" class="text-secondary small text-decoration-none"><i class="bi bi-arrow-left me-2"></i>Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/animations.js"></script>
</body>
</html>
