<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Clarity & Calm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <style>
        .login-bg {
            background: linear-gradient(135deg, var(--primary), var(--bg));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-circle {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent);
            opacity: 0.1;
            border-radius: 50%;
            top: -100px;
            right: -100px;
            z-index: 1;
        }

        .divider {
            position: relative;
            text-align: center;
        }
        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: #eee;
            z-index: 0;
        }
        .divider span {
            position: relative;
            background: white;
            padding: 0 15px;
            z-index: 1;
            color: #999;
            font-size: 0.8rem;
            font-weight: 600;
        }
        [data-theme="dark"] .divider span { background: #1a1a1a; }
        [data-theme="dark"] .divider::before { background: #333; }
        [data-theme="dark"] .social-btn { border-color: #333 !important; background: transparent; color: white !important; }
        [data-theme="dark"] .social-btn:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
    <div class="container-fluid bg-light-alt min-vh-100 d-flex align-items-center justify-content-center p-4" data-theme="light">
        <div class="row w-100 justify-content-center">
            <div class="col-lg-4 col-md-6 col-sm-8 fade-up">
                <div class="glass-card shadow-lg p-5 bg-white border-0">
                    <div class="text-center mb-5">
                        <a href="index.html" class="text-decoration-none">
                            <h2 class="brand-logo mb-3"><img src="assets/images/logo.png" alt="Logo">Clarity<span class="text-accent">&</span>Calm</h2>
                        </a>
                        <p class="text-secondary small mt-2">Welcome back to your recovery dashboard.</p>
                    </div>

                    <div class="mb-4">
                        <h3 class="fw-bold h2 text-center">Sign In</h3>
                    </div>

                    <form>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required style="padding: 12px 15px;">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Password</label>
                            <input type="password" class="form-control" placeholder="••••••••" required style="padding: 12px 15px;">
                        </div>
                        <div class="d-flex justify-content-between mb-4 small">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label text-secondary" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-primary text-decoration-none fw-medium">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 btn-shine mb-4">Sign In</button>
                        
                        <div class="divider mb-4">
                            <span>OR CONTINUE WITH</span>
                        </div>

                        <div class="d-flex gap-3 mb-4">
                            <button type="button" class="btn btn-outline-light w-100 py-2 d-flex align-items-center justify-content-center border-2 social-btn" style="border-color: #eee;">
                                <img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_128dp.png" alt="Google" style="width: 20px;" class="me-2">
                                <span class="small fw-bold text-dark">Google</span>
                            </button>
                            <button type="button" class="btn btn-outline-light w-100 py-2 d-flex align-items-center justify-content-center border-2 social-btn" style="border-color: #eee;">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Facebook_Logo_2023.png" alt="Facebook" style="width: 20px;" class="me-2">
                                <span class="small fw-bold text-dark">Facebook</span>
                            </button>
                        </div>

                        <div class="text-center">
                            <p class="text-secondary small">Don't have an account? <a href="signup.html" class="text-primary fw-bold text-decoration-none">Create an Account</a></p>
                        </div>
                    </form>

                    <div class="mt-5 pt-4 border-top">
                        <p class="text-secondary smaller text-center" style="font-size: 0.8rem;">
                            Your data is end-to-end encrypted and managed under our 
                            <a href="#" class="text-dark fw-bold">Privacy Policy</a>.
                        </p>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <a href="index.html" class="text-secondary small text-decoration-none"><i class="bi bi-arrow-left me-2"></i>Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/animations.js"></script>
</body>
</html>
