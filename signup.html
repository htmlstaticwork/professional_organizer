<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Clarity & Calm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <style>
        .signup-bg {
            background: linear-gradient(135deg, var(--bg), var(--primary));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 0;
        }

        .divider {
            position: relative;
            text-align: center;
        }
        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--glass-border);
            z-index: 0;
        }
        .divider span {
            position: relative;
            background: var(--surface);
            padding: 0 15px;
            z-index: 1;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
        }
        [data-theme="dark"] .social-btn { border-color: var(--glass-border) !important; background: transparent; color: white !important; }
        [data-theme="dark"] .social-btn:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
    <div class="container-fluid bg-light-alt min-vh-100 d-flex justify-content-center py-4 py-md-5 px-2 px-md-4">
        <div class="row w-100 justify-content-center my-4">
            <div class="col-lg-6 col-md-10 col-sm-11 fade-up">
                <div class="glass-card shadow-lg p-4 p-md-5 border">
                    <div class="text-center mb-5">
                        <a href="index.html" class="text-decoration-none d-flex justify-content-center">
                            <h2 class="brand-logo mb-3"><img src="assets/images/logo.png" alt="Logo">Clarity<span class="text-accent">&</span>Calm</h2>
                        </a>
                        <h2 class="fw-bold h2 mb-2">Create Account</h2>
                        <p class="text-secondary small mt-2">Start your personalized recovery path today.</p>
                    </div>

                    <form>
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label small fw-bold">First Name</label>
                                <input type="text" class="form-control" placeholder="John" required style="padding: 10px 15px;">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small fw-bold">Last Name</label>
                                <input type="text" class="form-control" placeholder="Doe" required style="padding: 10px 15px;">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small fw-bold">Email Address</label>
                                <input type="email" class="form-control" placeholder="name@example.com" required style="padding: 10px 15px;">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small fw-bold">Current Home Context (How can we help?)</label>
                                <textarea class="form-control" rows="2" placeholder="Briefly describe the area you'd like to address..." style="padding: 10px 15px;"></textarea>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small fw-bold">Password</label>
                                <input type="password" class="form-control" placeholder="Create a secure password" required style="padding: 10px 15px;">
                            </div>
                            <div class="col-md-12 py-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="terms" required>
                                    <label class="form-check-label text-secondary small" for="terms">
                                        I agree to the <a href="#" class="text-primary fw-bold text-decoration-none">Privacy Policy</a> and <a href="#" class="text-primary fw-bold text-decoration-none">Confidentiality Terms</a>.
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <button type="submit" class="btn btn-primary w-100 py-3 btn-shine mb-4">Create My Account</button>
                            </div>
                        </div>

                        <div class="divider mb-4">
                            <span>OR REGISTER WITH</span>
                        </div>

                        <div class="d-flex flex-column flex-md-row gap-2 gap-md-3 mb-4">
                            <button type="button" class="btn btn-outline-primary flex-fill py-2 d-flex align-items-center justify-content-center border-2 social-btn">
                                <img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_128dp.png" alt="Google" style="width: 20px;" class="me-2">
                                <span class="small fw-bold">Google</span>
                            </button>
                            <button type="button" class="btn btn-outline-primary flex-fill py-2 d-flex align-items-center justify-content-center border-2 social-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-apple me-2" viewBox="0 0 16 16" style="overflow: visible;">
                                    <path d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516s1.52.087 2.475-1.258.762-2.391.728-2.43m3.314 11.733c-.048-.096-2.325-1.234-2.113-3.422s1.675-2.279 1.698-2.284c-.096-1.295-1.162-1.428-1.48-1.424-1.272.03-2.454.89-3.078.89-.623 0-1.89-.861-2.906-.861-1.396 0-2.827.817-3.664 2.113-1.636 2.533-1.096 6.331.516 8.653.805 1.164 1.761 2.378 2.923 2.378 1.161 0 1.541-.756 2.872-.756 1.332 0 1.764.756 2.873.756 1.16 0 2.228-1.214 3.033-2.378.805-1.164 1.15-2.296 1.15-2.348z"/>
                                </svg>
                                <span class="small fw-bold">Apple</span>
                            </button>
                        </div>
                        
                        <div class="text-center">
                            <p class="text-secondary small">Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Sign In Instead</a></p>
                        </div>
                    </form>
                </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/animations.js"></script>
</body>
</html>
